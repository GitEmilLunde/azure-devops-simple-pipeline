trigger:
  - main

# Bruger Microsoft-hosted agent (skiftet fra self-hosted 'MacBook-Agent')
pool:
  vmImage: 'ubuntu-latest'

stages:

# ─────────────────────────────
# STAGE 1: SECRET SCANNING
# ─────────────────────────────
- stage: SecretScanning
  displayName: 'Secret Scanning'
  jobs:
  - job: DetectSecrets
    displayName: 'Find passwords i koden'
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.11'

    - script: pip install detect-secrets
      displayName: 'Installer detect-secrets'

    - script: |
        detect-secrets scan > .secrets.baseline
        detect-secrets audit .secrets.baseline
      displayName: 'Scan efter secrets'
      continueOnError: true

# ─────────────────────────────
# STAGE 2: SAST
# ─────────────────────────────
- stage: SAST
  displayName: 'SAST - Statisk kodeanalyse'
  dependsOn: SecretScanning
  jobs:
  - job: Bandit
    displayName: 'Kør Bandit sikkerhedsscan'
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.11'

    - script: pip install bandit
      displayName: 'Installer Bandit'

    - script: |
        bandit -r app.py -f json -o bandit-rapport.json
        bandit -r app.py
      displayName: 'Kør SAST scan'
      continueOnError: true

    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: 'bandit-rapport.json'
        artifactName: 'sikkerhedsrapport'
      displayName: 'Gem sikkerhedsrapport'

# ─────────────────────────────
# STAGE 3: BUILD OG TEST
# ─────────────────────────────
- stage: BuildOgTest
  displayName: 'Build og Test'
  dependsOn: SAST
  jobs:
  - job: Test
    displayName: 'Kør unit tests'
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.11'

    - script: pip install -r requirements.txt
      displayName: 'Installer dependencies'

    - script: |
        pip install pytest pytest-cov
        pytest test_app.py --junitxml=testresultater.xml
      displayName: 'Kør tests'

    - task: PublishTestResults@2
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: 'testresultater.xml'
      displayName: 'Publicer testresultater'

    - task: ArchiveFiles@2
      inputs:
        rootFolderOrFile: '$(System.DefaultWorkingDirectory)'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/app.zip'
      displayName: 'Zip applikationen'

    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: '$(Build.ArtifactStagingDirectory)/app.zip'
        artifactName: 'drop'
      displayName: 'Publicer artifact'

# ─────────────────────────────
# STAGE 4: DEPLOY
# ─────────────────────────────
- stage: Deploy
  displayName: 'Deploy til Azure App Service'
  dependsOn: BuildOgTest
  jobs:
  - deployment: DeployAPI
    displayName: 'Deploy Flask API'
    environment: 'produktion'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureCLI@2
            displayName: 'Opret App Service Plan og Web App hvis de ikke eksisterer'
            inputs:
              azureSubscription: 'ManagedIdentity1'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                plan_exists=$(az appservice plan list --resource-group MyVm_group --query "[?name=='MyVm_group-plan'].name" -o tsv)
                if [ -z "$plan_exists" ]; then
                  echo "App Service Plan eksisterer ikke - opretter den..."
                  az appservice plan create \
                    --name MyVm_group-plan \
                    --resource-group MyVm_group \
                    --sku F1 \
                    --is-linux
                else
                  echo "App Service Plan eksisterer allerede - springer over..."
                fi

                app_exists=$(az webapp list --resource-group MyVm_group --query "[?name=='emil-iot-api'].name" -o tsv)
                if [ -z "$app_exists" ]; then
                  echo "Web App eksisterer ikke - opretter den..."
                  az webapp create \
                    --name emil-iot-api \
                    --resource-group MyVm_group \
                    --plan MyVm_group-plan \
                    --runtime "PYTHON:3.11"
                else
                  echo "Web App eksisterer allerede - springer over..."
                fi
          - task: AzureWebApp@1
            inputs:
              azureSubscription: 'ManagedIdentity1'
              appType: 'webAppLinux'
              appName: 'emil-iot-api'
              package: '$(Pipeline.Workspace)/drop/app.zip'
              startupCommand: 'gunicorn --bind=0.0.0.0:8000 app:app'
            